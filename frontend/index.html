<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ══ Primary SEO ═══════════════════════════════════════════════════ -->
    <title>DocuFlow — AI Document Conversion & Generation Platform</title>
    <meta name="description" content="Convert PDF, DOCX, TXT, HTML, Markdown, images and more instantly. Generate professional documents with AI. Fast, secure — free with 10,000 tokens on signup. No credit card required." />
    <meta name="keywords" content="document converter, PDF to DOCX, DOCX to PDF, file converter online, AI document generation, convert PDF online, image converter, markdown to PDF, HTML to PDF, AI writing tool, document automation" />
    <meta name="author" content="DocuFlow" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <link rel="canonical" href="https://www.docuflow.app/" />

    <!-- ══ Open Graph (Facebook, LinkedIn, WhatsApp) ══════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="DocuFlow" />
    <meta property="og:title"       content="DocuFlow — AI Document Conversion & Generation" />
    <meta property="og:description" content="Convert 12+ file formats instantly. Generate professional documents with AI. 10,000 free tokens on signup. No credit card required." />
    <meta property="og:url"         content="https://www.docxflow.site/" />
    <meta property="og:image"       content="https://www.docxflow.site/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="DocuFlow — Convert files and generate documents with AI" />
    <meta property="og:locale"      content="en_US" />

    <!-- ══ Twitter / X Card ══════════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@docuflowapp" />
    <meta name="twitter:title"       content="DocuFlow — AI Document Conversion & Generation" />
    <meta name="twitter:description" content="Convert PDF, DOCX, images and more in seconds. AI document generation built in. 10,000 free tokens on signup." />
    <meta name="twitter:image"       content="https://www.docxflow.site/og-image.png" />

    <!-- ══ Favicon & PWA ══════════════════════════════════════════════════ -->
    <link rel="icon"             type="image/svg+xml"  href="/favicon.svg" />
    <link rel="icon"             type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon"             type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest"         href="/site.webmanifest" />
    <meta name="theme-color"         content="#6c63ff" />
    <meta name="msapplication-TileColor" content="#0a0a0f" />

    <!-- ══ Structured Data: SoftwareApplication ══════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "DocuFlow",
      "url": "https://www.docxflow.site",
      "logo": "https://www.docxflow.site/favicon.svg",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free tier with 10,000 tokens on signup — no credit card required"
      },
      "description": "AI-powered document conversion and generation platform. Convert between PDF, DOCX, TXT, HTML, Markdown, images and more. Generate and improve documents with AI.",
      "featureList": [
        "PDF to DOCX conversion",
        "DOCX to PDF conversion",
        "Markdown to PDF conversion",
        "HTML to PDF conversion",
        "Image format conversion (JPG, PNG, WEBP, HEIC, SVG, GIF)",
        "AI document generation",
        "AI document rewriting and improvement",
        "Conversion history",
        "Token-based pricing with free tier"
      ],
      "screenshot": "https://www.docxflow.site/og-image.png",
      "softwareVersion": "2.0",
      "datePublished": "2026-03-05"
    }
    </script>

    <!-- ══ Structured Data: Organization ══════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "DocuFlow",
      "url": "https://www.docxflow.site",
      "logo": "https://www.docxflow.site/favicon.svg",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "email": "support@docuflow.app",
        "availableLanguage": "English"
      }
    }
    </script>

    <!-- ══ Structured Data: FAQPage ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What file formats does DocuFlow support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DocuFlow supports PDF, DOCX, TXT, HTML, Markdown (MD), CSV, XLSX, JPG, PNG, WEBP, HEIC, SVG, and GIF. You can convert between most combinations of these formats instantly."
          }
        },
        {
          "@type": "Question",
          "name": "Is DocuFlow free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Every new account receives 10,000 free tokens on signup with no credit card required. Document conversions cost 500 tokens and image conversions cost 200 tokens. Additional tokens can be purchased when needed."
          }
        },
        {
          "@type": "Question",
          "name": "How does the AI document generation work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DocuFlow uses Claude by Anthropic to generate, improve, rewrite, and transform documents. Upload a file and give instructions, or start from a prompt to generate a document from scratch."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data secure on DocuFlow?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. Files are processed in isolated temporary directories and deleted immediately after conversion. Temporary output files in cloud storage are deleted within 24 hours. We never share your documents with third parties and do not retain file content permanently."
          }
        },
        {
          "@type": "Question",
          "name": "What is the difference between free and paid plans?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Free accounts receive 10,000 tokens and documents converted using free tokens include a watermark. Purchasing any token pack removes watermarks from all future conversions. There are no monthly subscriptions — you buy tokens as you need them."
          }
        }
      ]
    }
    </script>

    <!-- ══ Performance ════════════════════════════════════════════════════ -->
    <link rel="preconnect"  href="https://fonts.googleapis.com" />
    <link rel="preconnect"  href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://checkout.paystack.com" />

    <!-- ══ Fonts ══════════════════════════════════════════════════════════ -->
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
