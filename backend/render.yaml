services:
  - type: web
    name: docuflow-api
    runtime: python
    region: frankfurt      # matches EU database + Vercel EU region
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: >
      gunicorn app.main:app
      -k uvicorn.workers.UvicornWorker
      -w 1
      --bind 0.0.0.0:$PORT
      --timeout 120
      --keep-alive 5
      --log-level info
      --access-logfile -
    healthCheckPath: /health
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false